<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Private Access</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b1120;
      font-family: Arial, Helvetica, sans-serif;
      color: #ffffff;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: #151b2a;
      border: 1px solid #24304a;
      border-radius: 18px;
      padding: 28px 22px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: #2a2132;
      color: #ffb7d4;
      font-size: 12px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      line-height: 1.2;
    }

    p {
      margin: 0;
      color: #d4d7de;
      font-size: 16px;
      line-height: 1.7;
    }

    .hero {
      width: 100%;
      height: 260px;
      margin: 20px 0 16px;
      border-radius: 14px;
      background:
        linear-gradient(rgba(0,0,0,.2), rgba(0,0,0,.35)),
        url("https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=1000&q=80")
        center/cover no-repeat;
    }

    .btn {
      display: block;
      width: 100%;
      margin-top: 10px;
      padding: 18px;
      border-radius: 12px;
      background: linear-gradient(135deg, #ff4f93, #ff7c59);
      color: #ffffff;
      text-decoration: none;
      font-weight: bold;
      font-size: 18px;
      animation: pulse 1.5s infinite;
    }

    .timer {
      margin-top: 14px;
      font-size: 13px;
      color: #b8bec9;
    }

    .timer span {
      color: #ffb7d4;
      font-weight: bold;
    }

    .note {
      margin-top: 16px;
      font-size: 11px;
      color: #8d94a1;
      line-height: 1.5;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">18+ Private Access</div>

    <h1>Private Access Verified</h1>

    <p>
      Your access is being prepared.
      Please continue to the next page.
    </p>

    <div class="hero"></div>

    <a
      class="btn"
      id="enterBtn"
      href="https://t.acrsmartcam.com/402888/8873/0?aff_sub5=SF_006OG000004lmDN"
    >
      Continue ▶
    </a>

    <div class="timer">
      Redirecting in <span id="count">3</span> seconds...
    </div>

    <div class="note">
      By continuing, you confirm that you are of legal age in your jurisdiction.
    </div>
  </div>

  <script>
    const OFFER_URL = "https://t.acrsmartcam.com/402888/8873/0?aff_sub5=SF_006OG000004lmDN";
    const REDIRECT_MS = 3000;

    const countEl = document.getElementById("count");
    const enterBtn = document.getElementById("enterBtn");

    enterBtn.href = OFFER_URL;

    let secondsLeft = Math.ceil(REDIRECT_MS / 1000);
    countEl.textContent = secondsLeft;

    const timer = setInterval(function () {
      secondsLeft--;

      if (secondsLeft <= 0) {
        clearInterval(timer);
        window.location.href = OFFER_URL;
      } else {
        countEl.textContent = secondsLeft;
      }
    }, 1000);
  </script>
</body>
</html>
