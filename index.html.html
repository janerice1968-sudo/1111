<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google" content="notranslate" />
  <title>Private Access</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #071024;
      font-family: Arial, Helvetica, sans-serif;
      color: #ffffff;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: #121a2b;
      border: 1px solid #22304a;
      border-radius: 20px;
      padding: 28px 22px 22px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.38);
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: #2b2133;
      color: #ffb7d4;
      font-size: 12px;
      margin-bottom: 14px;
      line-height: 1;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      line-height: 1.2;
      font-weight: 700;
    }

    p {
      margin: 0;
      color: #d3d8e2;
      font-size: 16px;
      line-height: 1.6;
    }

    .hero {
      width: 100%;
      height: 260px;
      margin: 20px 0 16px;
      border-radius: 14px;
      background:
        linear-gradient(rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0.32)),
        url("https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=1000&q=80")
        center/cover no-repeat;
    }

    .btn {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 18px;
      border-radius: 12px;
      background: linear-gradient(135deg, #ff2f6d, #ff9a3c);
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
      font-size: 18px;
      line-height: 1;
      animation: pulse 1.5s infinite;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      opacity: 0.97;
    }

    .timer {
      margin-top: 14px;
      font-size: 13px;
      color: #b8bec9;
      min-height: 18px;
    }

    .timer span {
      color: #ffb7d4;
      font-weight: 700;
    }

    .note {
      margin-top: 16px;
      font-size: 11px;
      color: #8d94a1;
      line-height: 1.5;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    @media (max-width: 640px) {
      .card {
        max-width: 420px;
        padding: 24px 18px 20px;
      }

      h1 {
        font-size: 28px;
      }

      p {
        font-size: 15px;
      }

      .hero {
        height: 220px;
      }

      .btn {
        font-size: 17px;
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">18+ Private Access</div>

    <h1>Private Access Verified</h1>

    <p>Continue below to enter.</p>

    <div class="hero"></div>

    <a
      class="btn"
      id="enterBtn"
      href="https://t.acrsmartcam.com/402888/8873/0?aff_sub5=SF_006OG000004lmDN"
    >
      Unlock Now ▶
    </a>

    <div class="timer" id="timerText">
      Loading access in <span id="count">3</span>s...
    </div>

    <div class="note">
      By continuing, you confirm that you are of legal age in your jurisdiction.
    </div>
  </div>

  <script>
    const OFFER_URL = "https://t.acrsmartcam.com/402888/8873/0?aff_sub5=SF_006OG000004lmDN";

    // 统一随机跳转时间：1500ms 到 2500ms
    const REDIRECT_MS = Math.floor(Math.random() * (2500 - 1500 + 1)) + 1500;

    const enterBtn = document.getElementById("enterBtn");
    const countEl = document.getElementById("count");

    enterBtn.href = OFFER_URL;

    let secondsLeft = Math.ceil(REDIRECT_MS / 1000);
    countEl.textContent = secondsLeft;

    const timer = setInterval(function () {
      secondsLeft--;

      if (secondsLeft <= 0) {
        clearInterval(timer);
      } else {
        countEl.textContent = secondsLeft;
      }
    }, 1000);

    setTimeout(function () {
      window.location.href = OFFER_URL;
    }, REDIRECT_MS);
  </script>
</body>
</html>
